name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --config.extraMetadata.main=electron/main.js

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: release/*.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: portable
          path: release/*便携版*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
