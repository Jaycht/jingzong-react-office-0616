name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-electron:
    name: Electron 桌面版
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vite build
      - run: npx electron-builder --config.extraMetadata.main=electron/main.cjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: 安装包
          path: release/*.exe

  build-web:
    name: 纯网页便携版
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vite build
      - name: 打包网页版
        run: |
          mkdir -p release/web-portable
          cp -r dist release/web-portable/
          cp app.ico release/web-portable/
          # 复制启动脚本（已存放在仓库根目录）
          cp 启动网页版.bat release/web-portable/启动.bat
          # 打包为 zip
          cd release
          zip -r web-portable.zip web-portable/
      - uses: actions/upload-artifact@v4
        with:
          name: web-portable
          path: release/web-portable.zip
