name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-electron:
    name: Electron 桌面版
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vite build
      - run: npx electron-builder --config.extraMetadata.main=electron/main.cjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: 安装包
          path: release/*.exe

  build-web:
    name: 纯网页便携版
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx vite build
      - name: 打包网页版
        run: |
          mkdir -p release/web-portable
          cp -r dist release/web-portable/
          cp app.ico release/web-portable/
          # 创建启动脚本
          cat > release/web-portable/启动.bat << 'BATEOF'
@echo off
title 经侦大队工作记录管理系统
chcp 65001 >nul
set "CHROME="
for %%p in (
  "%ProgramFiles%\Google\Chrome\Application\chrome.exe"
  "%ProgramFiles(x86)%\Google\Chrome\Application\chrome.exe"
  "%LocalAppData%\Google\Chrome\Application\chrome.exe"
) do if exist "%%~p" set "CHROME=%%~p" & goto found
for %%p in (
  "%ProgramFiles(x86)%\Microsoft\Edge\Application\msedge.exe"
  "%ProgramFiles%\Microsoft\Edge\Application\msedge.exe"
) do if exist "%%~p" set "CHROME=%%~p" & goto found
:found
if "%CHROME%"=="" (
  echo [错误] 未找到 Chrome 或 Edge，请安装后重试
  pause & exit /b 1
)
start "" "%CHROME%" --new-window --app="%~dp0dist\index.html"
exit
BATEOF
          # 打包为 zip
          cd release
          zip -r 经侦大队工作记录管理系统_网页版.zip web-portable/
      - uses: actions/upload-artifact@v4
        with:
          name: 网页便携版
          path: release/*.zip
